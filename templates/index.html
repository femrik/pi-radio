<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>π Radio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Share+Tech+Mono&family=Bebas+Neue&display=swap">
<style>
/* ── リセット & 変数 ───────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #07070f;
  --panel:     #0e0e1c;
  --card:      #13132a;
  --border:    #1e1e40;
  --accent:    #f97316;
  --accent2:   #38bdf8;
  --dim:       #3a3a6a;
  --text:      #c8cce8;
  --text-dim:  #5a5a90;
  --glow:      rgba(249,115,22,0.4);
  --glow2:     rgba(56,189,248,0.3);
  --red:       #f43f5e;
  --green:     #22d3a5;
  --font-mono: 'Share Tech Mono', monospace;
  --font-jp:   'Noto Sans JP', sans-serif;
  --font-disp: 'Bebas Neue', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-jp);
  font-size: 14px;
  overflow: hidden;
}

/* ── レイアウト ────────────────────────────── */
.app {
  display: grid;
  height: 100vh;
  grid-template-rows: 50px 1fr;
  grid-template-columns: 220px 1fr;
  grid-template-areas:
    "header header"
    "sidebar main";
}

/* ── ヘッダー ─────────────────────────────── */
header {
  grid-area: header;
  display: flex;
  align-items: center;
  padding: 0 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.logo {
  font-family: var(--font-disp);
  font-size: 26px;
  letter-spacing: 3px;
  color: var(--accent);
  text-shadow: 0 0 12px var(--glow);
  user-select: none;
}
.logo span { color: var(--accent2); }
.area-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 1px;
}
.header-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--dim);
  transition: background .3s;
  flex-shrink: 0;
}
.dot.live    { background: var(--red);   box-shadow: 0 0 6px var(--red); }
.dot.playing { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }
@keyframes pulse {
  0%, 100% { opacity:1; } 50% { opacity:.4; }
}

/* ── サイドバー ───────────────────────────── */
.sidebar {
  grid-area: sidebar;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 12px 14px 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
}
.station-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--dim) transparent;
}
.station-list::-webkit-scrollbar { width: 4px; }
.station-list::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.station-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  border-left: 2px solid transparent;
  user-select: none;
}
.station-item:hover {
  background: rgba(249,115,22,.07);
  border-left-color: var(--dim);
}
.station-item.active {
  background: rgba(249,115,22,.12);
  border-left-color: var(--accent);
}
.station-logo {
  width: 36px; height: 36px;
  border-radius: 4px;
  object-fit: contain;
  background: var(--card);
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.station-logo-fallback {
  width: 36px; height: 36px;
  border-radius: 4px;
  background: var(--card);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  color: var(--dim);
}
.station-name {
  font-size: 12px;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.station-loading {
  text-align: center;
  padding: 30px 14px;
  color: var(--text-dim);
  font-size: 12px;
  font-family: var(--font-mono);
}

/* ── メインエリア ──────────────────────────── */
main {
  grid-area: main;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* タブ */
.tabs {
  display: flex;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  padding: 10px 22px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* タブコンテンツ */
.tab-panel { display: none; flex: 1; overflow: hidden; }
.tab-panel.active { display: flex; flex-direction: column; }

/* ── ライブパネル ──────────────────────────── */
#panel-live {
  padding: 24px;
  gap: 20px;
  overflow-y: auto;
}

/* Now Playing カード */
.now-playing-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  display: flex;
  gap: 24px;
  align-items: center;
  position: relative;
  overflow: hidden;
  min-height: 140px;
  transition: border-color .3s;
}
.now-playing-card.playing {
  border-color: rgba(249,115,22,.5);
  box-shadow: 0 0 24px rgba(249,115,22,.1), inset 0 0 40px rgba(249,115,22,.03);
}
.now-playing-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 0% 50%, rgba(249,115,22,.05) 0%, transparent 60%);
  pointer-events: none;
}
.np-logo {
  width: 88px; height: 88px;
  border-radius: 8px;
  object-fit: contain;
  background: var(--panel);
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.np-logo-fallback {
  width: 88px; height: 88px;
  border-radius: 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
}
.np-info { flex: 1; min-width: 0; }
.np-station {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--accent2);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.np-title {
  font-family: var(--font-disp);
  font-size: 22px;
  letter-spacing: 1px;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.np-title.empty { color: var(--text-dim); font-size: 16px; }
.np-pfm {
  font-size: 12px;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.np-mode-badge {
  position: absolute;
  top: 12px; right: 12px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 2px;
  padding: 3px 8px;
  border-radius: 3px;
  text-transform: uppercase;
}
.np-mode-badge.live {
  background: rgba(244,63,94,.15);
  border: 1px solid rgba(244,63,94,.4);
  color: var(--red);
}
.np-mode-badge.timefree {
  background: rgba(56,189,248,.12);
  border: 1px solid rgba(56,189,248,.4);
  color: var(--accent2);
}

/* イコライザー */
.equalizer {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 28px;
  margin-top: 10px;
  opacity: 0;
  transition: opacity .4s;
}
.equalizer.active { opacity: 1; }
.eq-bar {
  width: 3px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  box-shadow: 0 0 4px var(--glow);
  animation: eqbar 0s infinite alternate ease-in-out;
  height: 4px;
}
.equalizer.active .eq-bar { animation-duration: var(--d); }
@keyframes eqbar {
  from { height: 3px; }
  to   { height: var(--h); }
}

/* コントロール */
.controls {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.btn-play {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .2s, box-shadow .2s, transform .1s;
  box-shadow: 0 0 0 rgba(249,115,22,0);
}
.btn-play:hover {
  background: #fb923c;
  box-shadow: 0 0 16px var(--glow);
}
.btn-play:active { transform: scale(.93); }
.btn-play svg { fill: #000; width: 20px; height: 20px; }
.btn-play.stop-mode { background: var(--red); }
.btn-play.stop-mode:hover { box-shadow: 0 0 16px rgba(244,63,94,.5); }

.volume-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
}
.vol-icon {
  color: var(--text-dim);
  flex-shrink: 0;
  font-size: 18px;
}
input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--glow);
  cursor: pointer;
  transition: box-shadow .2s;
}
input[type=range]:hover::-webkit-slider-thumb {
  box-shadow: 0 0 12px var(--glow);
}
.vol-val {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  width: 30px;
  text-align: right;
  flex-shrink: 0;
}

/* ── タイムフリーパネル ─────────────────────── */
#panel-tf {
  flex-direction: column;
  overflow: hidden;
}
.tf-controls {
  padding: 14px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.tf-select {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 5px;
  font-family: var(--font-jp);
  font-size: 13px;
  outline: none;
  cursor: pointer;
  transition: border-color .2s;
}
.tf-select:focus { border-color: var(--accent); }
.tf-date-group {
  display: flex;
  gap: 6px;
}
.date-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 10px;
  border-radius: 5px;
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.date-btn:hover { border-color: var(--accent); color: var(--text); }
.date-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(249,115,22,.1);
}
.tf-load-btn {
  background: var(--accent);
  border: none;
  color: #000;
  padding: 7px 16px;
  border-radius: 5px;
  font-family: var(--font-jp);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background .2s;
}
.tf-load-btn:hover { background: #fb923c; }

.program-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--dim) transparent;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.program-list::-webkit-scrollbar { width: 4px; }
.program-list::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.prog-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  display: flex;
  gap: 14px;
  align-items: center;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.prog-item:hover {
  border-color: rgba(56,189,248,.5);
  background: rgba(56,189,248,.04);
}
.prog-time {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent2);
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 56px;
}
.prog-info { flex: 1; min-width: 0; }
.prog-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.prog-pfm {
  font-size: 11px;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.prog-play-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(56,189,248,.15);
  border: 1px solid rgba(56,189,248,.3);
  color: var(--accent2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  transition: all .15s;
  font-size: 12px;
}
.prog-item:hover .prog-play-btn {
  background: rgba(56,189,248,.3);
  box-shadow: 0 0 8px var(--glow2);
}
.prog-empty {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 12px;
}

/* ── スキャンライン / ノイズ overlay ──────── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.06) 2px,
    rgba(0,0,0,.06) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── トースト通知 ─────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  transition: transform .3s;
  z-index: 1000;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── レスポンシブ（モバイル） ─────────────── */
@media (max-width: 600px) {
  .app {
    grid-template-rows: 44px auto 1fr;
    grid-template-columns: 1fr;
    grid-template-areas:
      "header"
      "sidebar"
      "main";
    overflow: auto;
  }
  html, body { overflow: auto; }
  .sidebar {
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: 140px;
    overflow-x: auto;
    overflow-y: hidden;
  }
  .station-list {
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 6px;
    gap: 6px;
  }
  .station-item {
    flex-direction: column;
    min-width: 64px;
    padding: 8px 6px;
    border-left: none;
    border-bottom: 2px solid transparent;
    border-radius: 6px;
    text-align: center;
    gap: 4px;
  }
  .station-item.active { border-bottom-color: var(--accent); border-left: none; }
  .station-name { font-size: 10px; }
  .station-logo, .station-logo-fallback { width: 42px; height: 42px; }
  main { overflow: auto; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ヘッダー -->
  <header>
    <div class="logo">π<span>RADIO</span></div>
    <div class="area-badge" id="area-badge">LOADING...</div>
    <div class="header-status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">待機中</span>
    </div>
  </header>

  <!-- サイドバー: 局一覧 -->
  <aside class="sidebar">
    <div class="sidebar-header">◈ STATIONS</div>
    <div class="station-list" id="station-list">
      <div class="station-loading">📡 局一覧を取得中...</div>
    </div>
  </aside>

  <!-- メイン -->
  <main>
    <!-- タブ -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="live">◉ ライブ</button>
      <button class="tab-btn" data-tab="tf">⏪ タイムフリー</button>
    </div>

    <!-- ライブパネル -->
    <div class="tab-panel active" id="panel-live">
      <!-- Now Playing -->
      <div class="now-playing-card" id="np-card">
        <div class="np-logo-fallback" id="np-logo-wrap">📻</div>
        <div class="np-info">
          <div class="np-station" id="np-station">局を選んでください</div>
          <div class="np-title empty" id="np-title">— π Radio —</div>
          <div class="np-pfm" id="np-pfm"></div>
          <!-- イコライザー -->
          <div class="equalizer" id="eq"></div>
        </div>
        <div class="np-mode-badge live" id="np-mode" style="display:none">LIVE</div>
      </div>

      <!-- コントロール -->
      <div class="controls">
        <button class="btn-play" id="btn-play" title="再生">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="volume-wrap">
          <span class="vol-icon">🔊</span>
          <input type="range" id="vol-slider" min="0" max="100" value="80">
          <span class="vol-val" id="vol-val">80</span>
        </div>
      </div>
    </div>

    <!-- タイムフリーパネル -->
    <div class="tab-panel" id="panel-tf">
      <div class="tf-controls">
        <select class="tf-select" id="tf-station">
          <option value="">— 局を選択 —</option>
        </select>
        <div class="tf-date-group" id="tf-dates"></div>
        <button class="tf-load-btn" id="tf-load-btn">番組表を取得</button>
      </div>
      <div class="program-list" id="program-list">
        <div class="prog-empty">局と日付を選んで「番組表を取得」を押してください</div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ── 状態 ─────────────────────────────────────
const state = {
  stations:        [],
  selectedStation: null,  // {id, name, logo}
  isPlaying:       false,
  mode:            'live',
  volume:          80,
  tfStation:       null,
  tfDate:          null,
};

// ── DOM ───────────────────────────────────────
const $ = id => document.getElementById(id);
const stationList = $('station-list');
const npCard      = $('np-card');
const npLogo      = $('np-logo-wrap');
const npStation   = $('np-station');
const npTitle     = $('np-title');
const npPfm       = $('np-pfm');
const npMode      = $('np-mode');
const btnPlay     = $('btn-play');
const volSlider   = $('vol-slider');
const volVal      = $('vol-val');
const eq          = $('eq');
const tfSelect    = $('tf-station');
const tfDates     = $('tf-dates');
const progList    = $('program-list');

// ── イコライザー ──────────────────────────────
(function buildEq(){
  const heights = [12,20,16,24,10,22,14,18,8,26,12,20];
  const delays  = [0,.2,.1,.35,.05,.3,.15,.4,.08,.25,.18,.45];
  heights.forEach((h,i)=>{
    const bar = document.createElement('div');
    bar.className = 'eq-bar';
    bar.style.cssText = `--h:${h}px; --d:${delays[i]}s; animation-delay:${delays[i]}s;`;
    eq.appendChild(bar);
  });
})();

// ── タブ切り替え ──────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    $(`panel-${btn.dataset.tab}`).classList.add('active');
  });
});

// ── 日付ボタン生成 ────────────────────────────
function buildDateButtons(){
  tfDates.innerHTML = '';
  const labels = ['今日','昨日','2日前','3日前','4日前','5日前','6日前'];
  labels.forEach((lbl, i) => {
    const d   = new Date();
    d.setDate(d.getDate() - i);
    const str = fmtDate(d);
    const btn = document.createElement('button');
    btn.className   = 'date-btn' + (i===0?' active':'');
    btn.textContent = lbl;
    btn.dataset.date = str;
    btn.addEventListener('click', () => {
      tfDates.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.tfDate = str;
    });
    tfDates.appendChild(btn);
  });
  state.tfDate = fmtDate(new Date());
}

function fmtDate(d){
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

// ── API ──────────────────────────────────────
async function fetchJSON(url, opts={}){
  const r = await fetch(url, {headers:{'Content-Type':'application/json'}, ...opts});
  return r.json();
}

// 局一覧ロード
async function loadStations(){
  const data = await fetchJSON('/api/stations').catch(()=>[]);
  state.stations = data;

  // サイドバー
  stationList.innerHTML = '';
  data.forEach(st => {
    const item = document.createElement('div');
    item.className = 'station-item';
    item.dataset.id = st.id;

    const logoEl = st.logo
      ? `<img class="station-logo" src="${st.logo}" alt="${st.name}" onerror="this.outerHTML='<div class=\\'station-logo-fallback\\'>📻</div>'">`
      : `<div class="station-logo-fallback">📻</div>`;

    item.innerHTML = `${logoEl}<span class="station-name">${st.name}</span>`;
    item.addEventListener('click', () => selectStation(st));
    stationList.appendChild(item);
  });

  // タイムフリー局セレクト
  tfSelect.innerHTML = '<option value="">— 局を選択 —</option>';
  data.forEach(st => {
    const opt = document.createElement('option');
    opt.value       = st.id;
    opt.textContent = st.name;
    tfSelect.appendChild(opt);
  });

  // エリアバッジ
  const badge = await fetchJSON('/api/status').catch(()=>({}));
  updateStatusUI(badge);

  // エリア名はstatusに含まれないので別途
  $('area-badge').textContent = data.length > 0 ? `${data.length} STATIONS` : 'NO DATA';
}

// 局選択
async function selectStation(st) {
    state.selectedStation = st;
    stationList.querySelectorAll('.station-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === st.id);
    });

    // 番組情報をリセット表示
    npStation.textContent = st.name;
    npTitle.textContent   = '取得中...';
    npPfm.textContent     = '';

    // 局クリック時に番組情報を取得
    try {
        const info = await fetchJSON(`/api/station_info/${st.id}`);
        const np   = info.nowplaying || {};
        updateNowPlaying({
            station: st,
            program: { title: np.title, pfm: np.pfm },
            mode: state.isPlaying && state.selectedStation?.id === st.id ? state.mode : 'live',
        });
        // 今日のスケジュールをライブパネルに表示
        renderTodaySchedule(info.programs || [], st.id);
    } catch (e) {
        npTitle.textContent = '— π Radio —';
    }
}

function renderTodaySchedule(programs, stationId) {
    // 既存の schedule エリアがあれば更新、なければ作成
    let schedEl = document.getElementById('today-schedule');
    if (!schedEl) {
        schedEl = document.createElement('div');
        schedEl.id = 'today-schedule';
        schedEl.style.cssText = `
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden;
        `;
        // ライブパネルの一番下に追加
        document.getElementById('panel-live').appendChild(schedEl);
    }

    const header = `
        <div style="padding:10px 16px; font-family:var(--font-mono);
                    font-size:10px; letter-spacing:2px; color:var(--text-dim);
                    border-bottom:1px solid var(--border)">
            ◈ TODAY'S SCHEDULE
        </div>`;

    const rows = programs.map(p => {
        const isNow = p.is_now;
        const canTF = p.is_timefree;
        const accent = isNow ? 'var(--accent)' : canTF ? 'var(--accent2)' : 'var(--text-dim)';
        const badge  = isNow ? '▶ ON AIR' : canTF ? '⏪ TF' : '📅';
        return `
            <div style="display:flex; align-items:center; gap:12px;
                        padding:8px 16px; border-bottom:1px solid var(--border);
                        cursor:${canTF ? 'pointer' : 'default'};
                        background:${isNow ? 'rgba(249,115,22,.07)' : 'transparent'}"
                 onclick="${canTF ? `playTimefree({ft:'${p.ft}',to:'${p.to}',title:'${p.title.replace(/'/g,"\\'")}',pfm:'${(p.pfm||'').replace(/'/g,"\\'")}',ft_display:'${p.ft_display}',date_display:''}, '${stationId}')` : ''}">
                <span style="font-family:var(--font-mono);font-size:11px;
                             color:${accent};min-width:40px">${p.ft_display}</span>
                <span style="flex:1;font-size:12px;overflow:hidden;
                             text-overflow:ellipsis;white-space:nowrap;
                             font-weight:${isNow?'700':'400'}">${p.title || '(タイトルなし)'}</span>
                <span style="font-family:var(--font-mono);font-size:9px;
                             color:${accent}">${badge}</span>
            </div>`;
    }).join('');

    schedEl.innerHTML = header + rows;
}

// ── 再生・停止 ────────────────────────────────
btnPlay.addEventListener('click', async () => {
  if(state.isPlaying){
    // 停止
    await fetchJSON('/api/stop', {method:'POST'});
    state.isPlaying = false;
    updatePlayButton();
    updateEq(false);
    npMode.style.display = 'none';
    npCard.classList.remove('playing');
    $('status-dot').className = 'dot';
    $('status-text').textContent = '待機中';
    return;
  }

  if(!state.selectedStation){
    toast('局を選んでください');
    return;
  }

  toast('🎙 接続中...');
  const body = {
    station_id: state.selectedStation.id,
    mode: 'live',
  };
  const res = await fetchJSON('/api/play', {method:'POST', body: JSON.stringify(body)});
  if(res.error){ toast('❌ ' + res.error); return; }
  state.isPlaying = true;
  state.mode = 'live';
  updatePlayButton();
  updateEq(true);
  updateNowPlaying(res);
  toast('▶ 再生開始: ' + state.selectedStation.name);
});

// タイムフリー再生
async function playTimefree(prog, stationIdOverride) {
    const stId = stationIdOverride || tfSelect.value;
  if(!stId){ toast('局を選んでください'); return; }
  const st = state.stations.find(s=>s.id===stId);

  // 既に再生中なら停止
  if(state.isPlaying){
    await fetchJSON('/api/stop', {method:'POST'});
    state.isPlaying = false;
  }

  toast('⏪ タイムフリー接続中...');
  const body = {
    station_id:    stId,
    mode:          'timefree',
    ft:            prog.ft,
    to:            prog.to,
    program_title: prog.title,
    pfm:           prog.pfm || '',
  };
  const res = await fetchJSON('/api/play', {method:'POST', body: JSON.stringify(body)});
  if(res.error){ toast('❌ ' + res.error); return; }

  state.isPlaying      = true;
  state.mode           = 'timefree';
  state.selectedStation = st;

  // サイドバー選択更新
  stationList.querySelectorAll('.station-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.id === stId);
  });

  updatePlayButton();
  updateEq(true);
  updateNowPlaying({
    station: st,
    program: { title: prog.title, pfm: prog.pfm },
    mode: 'timefree',
  });
  toast(`⏪ ${prog.date_display} ${prog.ft_display} 「${prog.title}」`);
}

// 番組表ロード
$('tf-load-btn').addEventListener('click', async () => {
  const stId = tfSelect.value;
  if(!stId){ toast('局を選んでください'); return; }
  const date = state.tfDate;
  progList.innerHTML = '<div class="prog-empty">📡 取得中...</div>';
  const progs = await fetchJSON(`/api/programs/${stId}?date=${date}`).catch(()=>[]);
  if(!progs.length){
    progList.innerHTML = '<div class="prog-empty">番組が見つかりませんでした</div>';
    return;
  }
  progList.innerHTML = '';
  progs.forEach(p => {
    const item = document.createElement('div');
    item.className = 'prog-item';
    item.innerHTML = `
      <div class="prog-time">${p.date_display}<br>${p.ft_display}</div>
      <div class="prog-info">
        <div class="prog-title">${p.title || '(タイトルなし)'}</div>
        <div class="prog-pfm">${p.pfm || ''}</div>
      </div>
      <div class="prog-play-btn" title="再生">▶</div>
    `;
    item.querySelector('.prog-play-btn').addEventListener('click', e => {
      e.stopPropagation();
      playTimefree(p);
    });
    progList.appendChild(item);
  });
});

// ── UI 更新 ───────────────────────────────────
function updatePlayButton(){
  if(state.isPlaying){
    btnPlay.classList.add('stop-mode');
    btnPlay.innerHTML = `<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>`;
    btnPlay.title = '停止';
  } else {
    btnPlay.classList.remove('stop-mode');
    btnPlay.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
    btnPlay.title = '再生';
  }
}

function updateEq(active){
  eq.classList.toggle('active', active);
}

function updateNowPlaying(data){
  const st   = data.station || {};
  const prog = data.program || {};
  const mode = data.mode || 'live';

  // ロゴ
  if(st.logo){
    npLogo.outerHTML = `<img class="np-logo" id="np-logo-wrap" src="${st.logo}" alt="${st.name}" onerror="this.outerHTML='<div class=\\'np-logo-fallback\\' id=\\'np-logo-wrap\\'>📻</div>'">`;
  } else {
    const el = document.getElementById('np-logo-wrap') || npLogo;
    el.outerHTML = `<div class="np-logo-fallback" id="np-logo-wrap">📻</div>`;
  }

  npStation.textContent  = st.name || '— 選局待ち —';
  npTitle.textContent    = prog.title || '— π Radio —';
  npTitle.classList.toggle('empty', !prog.title);
  npPfm.textContent      = prog.pfm || '';

  if(state.isPlaying){
    npMode.style.display = '';
    npMode.textContent   = mode === 'timefree' ? 'TIME FREE' : 'LIVE';
    npMode.className     = `np-mode-badge ${mode === 'timefree' ? 'timefree' : 'live'}`;
    npCard.classList.add('playing');
    $('status-dot').className  = 'dot ' + (mode==='timefree'?'live':'playing');
    $('status-text').textContent = mode==='timefree' ? 'タイムフリー再生中' : 'ライブ再生中';
  } else {
    npMode.style.display = 'none';
    npCard.classList.remove('playing');
  }
}

function updateStatusUI(s){
  if(!s) return;
  state.isPlaying = s.is_playing;
  state.volume    = s.volume ?? 80;
  volSlider.value = state.volume;
  volVal.textContent = state.volume;
  updatePlayButton();
  updateEq(s.is_playing);
  if(s.is_playing && s.station){
    state.selectedStation = s.station;
    state.mode = s.mode;
    updateNowPlaying(s);
    // サイドバー
    stationList.querySelectorAll('.station-item').forEach(el=>{
      el.classList.toggle('active', el.dataset.id === s.station.id);
    });
  }
}

// ── 音量 ──────────────────────────────────────
volSlider.addEventListener('input', () => {
  const v = parseInt(volSlider.value);
  volVal.textContent = v;
  state.volume = v;
});
volSlider.addEventListener('change', () => {
  fetchJSON('/api/volume', {method:'POST', body: JSON.stringify({volume: state.volume})});
});

// ── ポーリング: 状態・番組更新 ─────────────────
let pollTimer;
async function poll(){
  const s = await fetchJSON('/api/status').catch(()=>null);
  if(!s) return;

  // 外から止まった場合
  if(state.isPlaying && !s.is_playing){
    state.isPlaying = false;
    updatePlayButton();
    updateEq(false);
    npMode.style.display = 'none';
    npCard.classList.remove('playing');
    $('status-dot').className = 'dot';
    $('status-text').textContent = '待機中';
    return;
  }

  // ライブ中は番組情報を随時更新
  if(s.is_playing && s.mode==='live'){
    updateNowPlaying(s);
  }
}

function startPoll(){ pollTimer = setInterval(poll, 15000); }
function stopPoll(){  clearInterval(pollTimer); }
startPoll();

// ── トースト ──────────────────────────────────
let toastTimer;
function toast(msg){
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2800);
}

// ── 初期化 ────────────────────────────────────
buildDateButtons();
loadStations();

// 起動時に現在の状態を反映
fetchJSON('/api/status').then(s => {
  if(s && s.is_playing) updateStatusUI(s);
}).catch(()=>{});
</script>
</body>
